<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SupplyClean - Gestão de PDM</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    .hide-scroll::-webkit-scrollbar { display: none; }
    .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const initialSnippet = `Produto;Descrição;Especificação;Tipo;Unidade Medida;Conta Contábil;Status
00001304;ABACATE;;MC;KG;31010306;ATIVO
00001305;ABACAXI;;MC;PC;31010306;ATIVO
00002839;ABAFADOR DE RUIDO;;MC;UN;31010315;ATIVO
00008289;ABAIXADOR DE LINGUA;;MC;PT;31010309002;INATIVO
00006884;BANCADA ACO QUADRADA 500X500;"Bancada de Aço Quadrada 500X500X850MM: Dim.: 500x 500x 500mm (C x L x A), com uma porta e prateleira dividindo o espaço interno ao meio, porta com trava ou trinco. Fabricada em chapa 14# e cantoneira 1""1/2x 3/16. Lateral esquerda, direita e fundo fechadas com chapa 18#. Suporta até 100kg distribuídos. Acabamento de bordas sem canto vivo ou contundentes. Todas as junções em solda MIG tipo cordão cheio e contínuo, acabamento liso sem pontos de ranhuras ou sobras. Tratamento anticorrosivo e pintura eletrostática na cor preto fosco";AI;UN;32010101;ATIVO
00030010;SERVIÇO DE CONFECÇÃO DE CAPA;Serviço de confecção de capa para processo;SV;SV;31010618;ATIVO
00040023;ENVELOPE BRANCO TAMANHO A4;Serviço de confecção de envelope tamanho A4;SV;SV;31010618;ATIVO
00040024;ENVELOPE GRANDE 31X41CM;Serviço de confecção de envelope grande 31X41cm;SV;SV;31010618;ATIVO
00040025;ENVELOPE MEIO SACO;Serviço de confecção de envelope meio saco;SV;SV;31010618;ATIVO
00040026;ACETATO DE ZINCO DIHIDRATADO P.A - 500G;"Fórmula: (CH3COO)2Zn * 2 H2O; Peso Molecular: 219.49 g/mol; Ensaio: 99.5 %; CAS: 5970-45-6; Densidade de 1.74 g/cm3 (20 °C), com FISPQ e certificado de análise. Frasco com 250 g. Prazo de validade do item: não deve ser inferior a 80% da validade total.";MC;UN;31010309004;ATIVO`;

    const parseCSVText = (text) => {
      let rows = [];
      let currentRow = [];
      let currentCell = '';
      let insideQuotes = false;
      
      for (let i = 0; i < text.length; i++) {
        let c = text[i];
        let nextC = text[i+1];
        if (c === '"') {
          if (insideQuotes && nextC === '"') { currentCell += '"'; i++; } else { insideQuotes = !insideQuotes; }
        } else if (c === ';' && !insideQuotes) {
          currentRow.push(currentCell.trim()); currentCell = '';
        } else if (c === '\n' && !insideQuotes) {
          currentRow.push(currentCell.trim());
          if (currentRow.join('') !== '') rows.push(currentRow);
          currentRow = []; currentCell = '';
        } else if (c === '\r' && !insideQuotes) {
          if (nextC === '\n') {
            currentRow.push(currentCell.trim());
            if (currentRow.join('') !== '') rows.push(currentRow);
            currentRow = []; currentCell = ''; i++;
          } else {
            currentRow.push(currentCell.trim());
            if (currentRow.join('') !== '') rows.push(currentRow);
            currentRow = []; currentCell = '';
          }
        } else {
          currentCell += c;
        }
      }
      if (currentCell !== '' || currentRow.length > 0) {
        currentRow.push(currentCell.trim());
        if (currentRow.join('') !== '') rows.push(currentRow);
      }
      return rows;
    };

    const extractFeatures = (spec) => {
      if (!spec) return { medida: '-', cor: '-', outros: '-' };
      const specLower = spec.toLowerCase();
      const medidaMatch = specLower.match(/\b\d+(?:[.,]\d+)?\s*(cm|mm|m|kg|g|ml|l|x\s*\d+|g\/cm3|g\/mol)\b/gi);
      const medidas = medidaMatch ? [...new Set(medidaMatch)].join(', ') : '-';
      const corMatch = specLower.match(/\b(branco|preto|azul|vermelho|amarelo|verde|cinza|prata|fosco|incolor|transparente)\b/gi);
      const cores = corMatch ? [...new Set(corMatch)].join(', ') : '-';
      return { medida: medidas, cor: cores, original: spec };
    };

    const normalizeText = (text) => {
      if (!text) return '';
      return text.toString().normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
    };

    const getCategoryByConta = (conta) => {
      if (!conta) return 'Não Classificada';
      const c = String(conta).trim();
      if (c.startsWith('31010306')) return 'Alimentos e Gêneros';
      if (c.startsWith('31010315')) return 'EPI e Segurança';
      if (c.startsWith('31010309002')) return 'Material Médico/Odonto';
      if (c.startsWith('31010309')) return 'Material de Laboratório/Químico';
      if (c.startsWith('320101')) return 'Ativo Imobilizado/Móveis';
      if (c.startsWith('310106')) return 'Serviços de Terceiros/Gráfica';
      if (c.startsWith('310103')) return 'Material de Consumo Geral';
      return 'Outros Materiais/Serviços';
    };

    const getBigrams = (str) => {
      const bigrams = [];
      for (let i = 0; i < str.length - 1; i++) { bigrams.push(str.slice(i, i + 2)); }
      return bigrams;
    };

    const calculateSimilarity = (searchQuery, targetText) => {
      if (!searchQuery || !targetText) return 0;
      const s1 = normalizeText(searchQuery).replace(/\s+/g, '');
      const s2 = normalizeText(targetText).replace(/\s+/g, '');
      if (s1 === s2) return 100;
      const bg1 = getBigrams(s1);
      const bg2 = getBigrams(s2);
      if (bg1.length === 0 || bg2.length === 0) return 0;
      let intersection = 0;
      const bg2Copy = [...bg2];
      for (let i = 0; i < bg1.length; i++) {
        const index = bg2Copy.indexOf(bg1[i]);
        if (index > -1) { intersection++; bg2Copy.splice(index, 1); }
      }
      return Math.round((2.0 * intersection) / (bg1.length + bg2.length) * 100);
    };

    function App() {
      const [data, setData] = useState([]);
      const [globalSearch, setGlobalSearch] = useState('');
      const [filters, setFilters] = useState({ Status: '', Tipo: '', 'Unidade Medida': '', 'Conta Contábil': '' });
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [editingItem, setEditingItem] = useState(null);
      const [currentPage, setCurrentPage] = useState(1);
      const itemsPerPage = 10;

      // Estados do Radar de Duplicidades
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const [duplicateView, setDuplicateView] = useState(false);
      const [duplicateData, setDuplicateData] = useState([]);

      const [formData, setFormData] = useState({
        Produto: '', Descrição: '', Especificação: '', Tipo: '', 'Unidade Medida': '', 'Conta Contábil': '', Status: 'ATIVO'
      });

      useEffect(() => { loadCSVData(initialSnippet); }, []);

      const loadCSVData = (csvText) => {
        const rows = parseCSVText(csvText);
        if (rows.length < 2) return;
        const rawHeaders = rows[0];
        const headers = rawHeaders.map(h => {
          const clean = normalizeText(h);
          if (clean.includes("especifica")) return "Especificação";
          if (clean.includes("descri")) return "Descrição";
          if (clean.includes("conta cont")) return "Conta Contábil";
          if (clean.includes("unidade")) return "Unidade Medida";
          if (clean.includes("produto") || clean.includes("codigo")) return "Produto";
          if (clean.includes("tipo")) return "Tipo";
          if (clean.includes("status")) return "Status";
          return h;
        });

        const parsedData = rows.slice(1).map(values => {
          const obj = {};
          headers.forEach((header, index) => { obj[header] = values[index] || ''; });
          return obj;
        });
        
        setData(parsedData.filter(item => item.Produto));
        setDuplicateView(false); // Reseta a visão de duplicidade ao carregar novo CSV
      };

      const handleFileUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => { loadCSVData(event.target.result); };
          reader.readAsText(file);
        }
      };

      // MOTOR DE DETECÇÃO DE DUPLICIDADES
      const analyzeDuplicates = () => {
        if (duplicateView) {
          setDuplicateView(false); // Se já estiver na visão, volta ao normal
          return;
        }

        setIsAnalyzing(true);
        // Timeout para permitir que o React renderize o estado de "Analisando..." antes de travar o processo pesado
        setTimeout(() => {
          const groups = {};
          // 1. Agrupamento pela primeira palavra (Heurística para ganhar performance O(n^2) -> O(n*log n))
          data.forEach(item => {
            const firstWord = normalizeText(item.Descrição).split(/[\s-]/)[0] || 'outros';
            if (!groups[firstWord]) groups[firstWord] = [];
            groups[firstWord].push(item);
          });

          let clusterId = 1;
          const foundDuplicates = [];

          // 2. Varredura dentro de cada grupo
          Object.values(groups).forEach(group => {
            if (group.length < 2) return;
            const processed = new Set();
            
            for (let i = 0; i < group.length; i++) {
              if (processed.has(group[i].Produto)) continue;
              
              let currentCluster = [{ ...group[i], _clusterId: clusterId, _isMaster: true, _simScore: 100 }];
              
              for (let j = i + 1; j < group.length; j++) {
                if (processed.has(group[j].Produto)) continue;
                
                const sim = calculateSimilarity(group[i].Descrição, group[j].Descrição);
                // Threshold: Se for > 75% parecido, coloca no mesmo cluster
                if (sim >= 75) {
                  currentCluster.push({ ...group[j], _clusterId: clusterId, _isMaster: false, _simScore: sim });
                  processed.add(group[j].Produto);
                }
              }
              
              if (currentCluster.length > 1) {
                foundDuplicates.push(...currentCluster);
                clusterId++;
              }
              processed.add(group[i].Produto);
            }
          });

          setDuplicateData(foundDuplicates);
          setDuplicateView(true);
          setIsAnalyzing(false);
          setCurrentPage(1);
          setGlobalSearch(''); // Limpa a busca padrão para focar nas duplicidades
        }, 100);
      };

      const commonItems = useMemo(() => {
        const counts = {};
        data.forEach(item => {
          const desc = item.Descrição || '';
          const firstWord = desc.split(/[\s-]/)[0].trim().toUpperCase();
          if (firstWord && firstWord.length > 2) { counts[firstWord] = (counts[firstWord] || 0) + 1; }
        });
        return Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 15).map(entry => entry[0]);
      }, [data]);

      // Lógica de Filtro principal decide se usa os dados normais ou os dados de duplicidade
      const filteredData = useMemo(() => {
        const sourceData = duplicateView ? duplicateData : data;

        let result = sourceData.filter(item => {
          const searchStr = normalizeText(Object.values(item).join(' '));
          const searchTerms = normalizeText(globalSearch).trim().split(/\s+/);
          const matchesSearch = searchTerms.every(term => searchStr.includes(term));
          
          const matchesStatus = filters.Status ? item.Status.toUpperCase() === filters.Status.toUpperCase() : true;
          const matchesTipo = filters.Tipo ? item.Tipo.toUpperCase() === filters.Tipo.toUpperCase() : true;
          const matchesUnidade = filters['Unidade Medida'] ? item['Unidade Medida'].toUpperCase() === filters['Unidade Medida'].toUpperCase() : true;
          const matchesConta = filters['Conta Contábil'] ? item['Conta Contábil'] === filters['Conta Contábil'] : true;
          
          return matchesSearch && matchesStatus && matchesTipo && matchesUnidade && matchesConta;
        });

        // Só calcula score de busca livre se NÃO estiver na visão de duplicidades
        if (globalSearch.trim() && !duplicateView) {
          result = result.map(item => ({
            ...item,
            _simScore: calculateSimilarity(globalSearch, item.Descrição)
          })).sort((a, b) => b._simScore - a._simScore);
        }

        return result;
      }, [data, duplicateData, duplicateView, globalSearch, filters]);

      const totalPages = Math.ceil(filteredData.length / itemsPerPage);
      const currentData = filteredData.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);

      const totalItems = filteredData.length;
      const activeItems = filteredData.filter(d => d.Status?.toUpperCase() === 'ATIVO').length;
      const inactiveItems = filteredData.filter(d => d.Status?.toUpperCase() === 'INATIVO').length;
      const uniqueTypes = new Set(filteredData.map(d => d.Tipo)).size;

      const uniqueStatuses = [...new Set(data.map(d => d.Status?.toUpperCase()))].filter(Boolean).sort();
      const uniqueTipos = [...new Set(data.map(d => d.Tipo?.toUpperCase()))].filter(Boolean).sort();
      const uniqueUnidades = [...new Set(data.map(d => d['Unidade Medida']?.toUpperCase()))].filter(Boolean).sort();
      const uniqueContas = [...new Set(data.map(d => d['Conta Contábil']))].filter(Boolean).sort();

      const handleExportCSV = (exportType = 'ALL') => {
        let dataToExport = data;
        
        if (exportType === 'NEW') {
          dataToExport = data.filter(item => item._isNew);
          if (dataToExport.length === 0) { alert('Nenhum produto novo foi cadastrado nesta sessão.'); return; }
        } else if (exportType === 'FILTERED') {
          dataToExport = filteredData;
          if (dataToExport.length === 0) { alert('Não há itens para exportar.'); return; }
        } else if (exportType === 'DUPLICATES') {
          dataToExport = duplicateData;
          if (dataToExport.length === 0) { alert('Execute o Radar de Duplicidades primeiro.'); return; }
        } else if (data.length === 0) {
          return;
        }

        const headersOriginal = Object.keys(data[0] || {}).filter(k => !k.startsWith('_'));
        const exportHeaders = [...headersOriginal, 'Categoria Contábil', 'Faixa de Similaridade', 'Cluster Duplicidade'];
        
        const csvContent = [
          exportHeaders.join(';'),
          ...dataToExport.map(row => {
            const originalValues = headersOriginal.map(header => {
              let val = row[header] || '';
              if (header === 'Status' && row._isNew) val = 'NOVO';
              if (val.includes(';') || val.includes('"') || val.includes('\n')) {
                val = `"${val.replace(/"/g, '""')}"`;
              }
              return val;
            });
            
            const catContabil = getCategoryByConta(row['Conta Contábil']);
            const simScoreText = row._simScore !== undefined ? (row._simScore >= 80 ? 'ALTA' : row._simScore >= 40 ? 'MÉDIA' : 'BAIXA') : '-';
            const clusterId = row._clusterId !== undefined ? `Grupo ${row._clusterId}` : '-';

            return [...originalValues, catContabil, simScoreText, clusterId].join(';');
          })
        ].join('\n');

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        
        let filePrefix = 'Cadastro_Completo';
        if (exportType === 'NEW') filePrefix = 'Novos_Produtos';
        if (exportType === 'FILTERED') filePrefix = 'Produtos_Filtrados';
        if (exportType === 'DUPLICATES') filePrefix = 'Itens_Duplicados';
        
        link.setAttribute('download', `${filePrefix}_${new Date().toISOString().slice(0,10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const clearAllFilters = () => {
        setGlobalSearch('');
        setFilters({ Status: '', Tipo: '', 'Unidade Medida': '', 'Conta Contábil': '' });
        setCurrentPage(1);
      };

      const openModal = (item = null) => {
        if (item) {
          setEditingItem(item);
          setFormData(item);
        } else {
          setEditingItem(null);
          const nextId = (Math.max(...data.map(d => parseInt(d.Produto) || 0)) + 1).toString().padStart(8, '0');
          setFormData({ Produto: nextId, Descrição: '', Especificação: '', Tipo: '', 'Unidade Medida': '', 'Conta Contábil': '', Status: 'ATIVO' });
        }
        setIsModalOpen(true);
      };

      const closeModal = () => {
        setIsModalOpen(false);
        setEditingItem(null);
      };

      const handleSave = (e) => {
        e.preventDefault();
        let updatedData;
        if (editingItem) {
          updatedData = data.map(d => d.Produto === formData.Produto ? formData : d);
        } else {
          updatedData = [{...formData, Status: 'NOVO', _isNew: true}, ...data];
        }
        setData(updatedData);
        // Atualiza a visão de duplicidades se estiver aberta
        if (duplicateView) {
            setDuplicateData(duplicateData.map(d => d.Produto === formData.Produto ? { ...formData, _clusterId: d._clusterId, _isMaster: d._isMaster, _simScore: d._simScore } : d));
        }
        closeModal();
      };

      const handleDelete = (id) => {
        if (window.confirm('Tem certeza que deseja excluir este item permanentemente?')) {
          setData(data.filter(d => d.Produto !== id));
          if (duplicateView) setDuplicateData(duplicateData.filter(d => d.Produto !== id));
        }
      };

      const toggleStatus = (item) => {
        const novoStatus = item.Status?.toUpperCase() === 'ATIVO' ? 'INATIVO' : 'ATIVO';
        setData(data.map(d => d.Produto === item.Produto ? { ...d, Status: novoStatus } : d));
        if (duplicateView) {
            setDuplicateData(duplicateData.map(d => d.Produto === item.Produto ? { ...d, Status: novoStatus } : d));
        }
      };

      return (
        <div className="min-h-screen pb-12">
          {/* Header */}
          <header className="bg-white border-b border-slate-200 px-6 py-4 flex flex-col xl:flex-row justify-between items-center shadow-sm sticky top-0 z-10 gap-4 xl:gap-0">
            <div className="flex items-center gap-3 shrink-0">
              <div className="bg-slate-900 p-2 rounded-lg flex items-center justify-center w-10 h-10">
                <i className="fas fa-box text-white text-lg"></i>
              </div>
              <div>
                <h1 className="text-xl font-bold tracking-tight">SupplyClean</h1>
                <p className="text-xs text-slate-500 font-medium uppercase tracking-wider">Gestão e Saneamento de PDM</p>
              </div>
            </div>

            <div className="flex items-center gap-4 w-full xl:w-auto overflow-x-auto pb-2 xl:pb-0 hide-scroll">
              <div className="flex items-center gap-2 shrink-0">
                <label className="cursor-pointer bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 px-3 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-2 shadow-sm">
                  <i className="fas fa-upload text-slate-500"></i>
                  <span>Importar CSV</span>
                  <input type="file" accept=".csv" className="hidden" onChange={handleFileUpload} />
                </label>
                
                {/* BOTÃO DO RADAR DE DUPLICIDADES */}
                <button 
                  onClick={analyzeDuplicates} 
                  disabled={isAnalyzing}
                  className={`${duplicateView ? 'bg-indigo-600 text-white border-indigo-700 hover:bg-indigo-700' : 'bg-indigo-50 border-indigo-200 hover:bg-indigo-100 text-indigo-700'} border px-3 py-2 rounded-lg text-sm font-bold transition-colors flex items-center gap-2 shadow-sm`}
                >
                  {isAnalyzing ? <i className="fas fa-circle-notch fa-spin"></i> : <i className="fas fa-radar"></i>}
                  <span>{duplicateView ? 'Voltar Lista Completa' : 'Radar de Duplicidades'}</span>
                </button>

                <button onClick={() => handleExportCSV(duplicateView ? 'DUPLICATES' : 'FILTERED')} className="bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 px-3 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-2 shadow-sm">
                  <i className="fas fa-file-export text-slate-500"></i>
                  <span>{duplicateView ? 'Exportar Duplicados' : 'Exportar Filtrados'}</span>
                </button>
                <button onClick={() => openModal()} className="bg-slate-900 hover:bg-slate-800 text-white px-3 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-2 shadow-sm">
                  <i className="fas fa-plus"></i>
                  <span>Novo Produto</span>
                </button>
              </div>

              <div className="hidden xl:block w-px h-8 bg-slate-200 shrink-0"></div>
              <img 
                src="https://i.postimg.cc/qMYYkYbk/marca-CONJUNTAS-SESI-SENAI-2024-completa-colorida.png" 
                alt="Logo SESI SENAI" 
                className="h-9 object-contain shrink-0" 
              />
            </div>
          </header>

          <main className="max-w-[1400px] mx-auto px-6 mt-8">
            {/* Aviso visual quando está no Modo Duplicidade */}
            {duplicateView && (
              <div className="bg-indigo-900 border border-indigo-800 rounded-xl p-5 mb-8 flex flex-col md:flex-row gap-4 items-center shadow-lg transform transition-all">
                <div className="bg-white/10 p-3 rounded-full text-white shrink-0">
                  <i className="fas fa-exclamation-triangle text-xl"></i>
                </div>
                <div className="text-white flex-1">
                  <h2 className="text-lg font-bold mb-1">Modo Raio-X Ativado: Possíveis Duplicidades</h2>
                  <p className="text-sm text-indigo-200">
                    O algoritmo varreu toda a sua base e agrupou os itens que possuem <strong>75% ou mais de similaridade</strong> entre si. Compare-os abaixo e utilize o botão <i className="fas fa-toggle-on text-emerald-400"></i> para inativar as versões incorretas, mantendo apenas um item principal ativo por grupo.
                  </p>
                </div>
                <div className="shrink-0 text-center">
                  <span className="block text-3xl font-black text-white">{new Set(duplicateData.map(d => d._clusterId)).size}</span>
                  <span className="text-xs text-indigo-300 uppercase font-bold tracking-wider">Grupos Suspeitos</span>
                </div>
              </div>
            )}

            {/* KPIs */}
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
              <KPICard title={duplicateView ? "Itens Suspeitos" : "Itens Encontrados"} value={totalItems} icon={duplicateView ? "fas fa-copy" : "fas fa-list"} color={duplicateView ? "bg-indigo-50 text-indigo-700" : "bg-blue-50 text-blue-700"} />
              <KPICard title="Itens Ativos" value={activeItems} icon="fas fa-check-circle" color="bg-emerald-50 text-emerald-700" />
              <KPICard title="Itens Inativos" value={inactiveItems} icon="fas fa-times-circle" color="bg-rose-50 text-rose-700" />
              <KPICard title="Categorias (Tipo)" value={uniqueTypes} icon="fas fa-chart-line" color="bg-purple-50 text-purple-700" />
            </div>

            {/* Filtros e Busca (Escondido parcialmente no modo duplicidade para não confundir) */}
            {!duplicateView && (
              <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 mb-6 flex flex-col gap-4">
                <div className="flex flex-col lg:flex-row gap-4 items-center w-full">
                  <div className="relative w-full lg:w-2/3">
                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                      <i className="fas fa-search text-slate-400"></i>
                    </div>
                    <input
                      type="text"
                      className="block w-full pl-10 pr-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-slate-900 sm:text-sm bg-slate-50 transition-all outline-none"
                      placeholder="Busca avançada (código, descrição, especificação)..."
                      value={globalSearch}
                      onChange={(e) => setGlobalSearch(e.target.value)}
                    />
                  </div>
                  <select 
                    className="block w-full lg:w-1/3 py-2 px-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-slate-900 sm:text-sm bg-slate-50 outline-none text-slate-700 font-medium"
                    onChange={(e) => setGlobalSearch(e.target.value)}
                    value={commonItems.some(item => normalizeText(item) === normalizeText(globalSearch)) ? globalSearch.toUpperCase() : ''}
                  >
                    <option value="">Buscar itens comuns (Top 15)...</option>
                    {commonItems.map(item => (
                      <option key={item} value={item}>{item}</option>
                    ))}
                  </select>
                </div>

                <div className="flex flex-wrap items-center gap-3 w-full">
                  <div className="flex items-center gap-2 text-sm font-medium text-slate-600">
                    <i className="fas fa-filter"></i> Filtros:
                  </div>
                  <select className="border border-slate-300 rounded-lg text-sm p-2 bg-white flex-1 min-w-[120px] outline-none" value={filters.Status} onChange={(e) => setFilters({...filters, Status: e.target.value})}>
                    <option value="">Status (Todos)</option>
                    {uniqueStatuses.map(s => <option key={s} value={s}>{s}</option>)}
                  </select>
                  <select className="border border-slate-300 rounded-lg text-sm p-2 bg-white flex-1 min-w-[120px] outline-none" value={filters.Tipo} onChange={(e) => setFilters({...filters, Tipo: e.target.value})}>
                    <option value="">Tipo (Todos)</option>
                    {uniqueTipos.map(t => <option key={t} value={t}>{t}</option>)}
                  </select>
                  <select className="border border-slate-300 rounded-lg text-sm p-2 bg-white flex-1 min-w-[120px] outline-none" value={filters['Unidade Medida']} onChange={(e) => setFilters({...filters, 'Unidade Medida': e.target.value})}>
                    <option value="">Unidade (Todas)</option>
                    {uniqueUnidades.map(u => <option key={u} value={u}>{u}</option>)}
                  </select>
                  <select className="border border-slate-300 rounded-lg text-sm p-2 bg-white flex-[2] min-w-[180px] outline-none" value={filters['Conta Contábil']} onChange={(e) => setFilters({...filters, 'Conta Contábil': e.target.value})}>
                    <option value="">Conta Contábil (Todas)</option>
                    {uniqueContas.map(c => <option key={c} value={c}>{c} - {getCategoryByConta(c)}</option>)}
                  </select>
                  
                  <button onClick={clearAllFilters} className="bg-rose-50 text-rose-600 hover:bg-rose-100 hover:text-rose-700 px-3 py-2 rounded-lg text-sm font-bold flex items-center gap-2 border border-rose-200 transition-colors">
                    <i className="fas fa-eraser"></i> Limpar Filtros
                  </button>
                </div>
              </div>
            )}

            <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
              <div className="overflow-x-auto">
                <table className="min-w-full divide-y divide-slate-200">
                  <thead className="bg-slate-50">
                    <tr>
                      <th className="px-4 py-3 text-left text-xs font-bold text-slate-600 uppercase tracking-wider">Produto</th>
                      <th className="px-4 py-3 text-left text-xs font-bold text-slate-600 uppercase tracking-wider w-1/4">Descrição</th>
                      <th className="px-4 py-3 text-left text-xs font-bold text-slate-600 uppercase tracking-wider w-1/4">Análise Técnica</th>
                      <th className="px-4 py-3 text-left text-xs font-bold text-slate-600 uppercase tracking-wider">Classificação Contábil</th>
                      <th className="px-4 py-3 text-center text-xs font-bold text-slate-600 uppercase tracking-wider">
                        {duplicateView ? 'Grupo de Duplicidade' : 'Similaridade (Busca)'}
                      </th>
                      <th className="px-4 py-3 text-center text-xs font-bold text-slate-600 uppercase tracking-wider">Status</th>
                      <th className="px-4 py-3 text-right text-xs font-bold text-slate-600 uppercase tracking-wider">Ações</th>
                    </tr>
                  </thead>
                  <tbody className="bg-white divide-y divide-slate-200">
                    {currentData.length > 0 ? currentData.map((item, index) => {
                      const features = extractFeatures(item.Especificação);
                      const categoria = getCategoryByConta(item['Conta Contábil']);
                      
                      // Estilização alternada para agrupar os clusters visualmente
                      const isEvenCluster = item._clusterId ? item._clusterId % 2 === 0 : false;
                      const rowClass = duplicateView ? (isEvenCluster ? 'bg-indigo-50/30' : 'bg-white') : 'hover:bg-slate-50 transition-colors';

                      return (
                        <tr key={item.Produto + index} className={`${rowClass} group border-b border-slate-100`}>
                          <td className="px-4 py-4 whitespace-nowrap text-sm font-semibold text-slate-900 border-l-4" style={{ borderColor: duplicateView ? (isEvenCluster ? '#818cf8' : '#e2e8f0') : 'transparent' }}>
                            {item.Produto}
                            {item._isNew && <span className="ml-2 block mt-1 w-max px-1.5 py-0.5 rounded text-[10px] font-bold bg-amber-100 text-amber-800">NOVO</span>}
                          </td>
                          <td className="px-4 py-4 text-sm text-slate-800 font-medium">
                            {item.Descrição}
                          </td>
                          <td className="px-4 py-4 text-sm text-slate-600">
                            {item.Especificação ? (
                              <div className="flex flex-col gap-1.5">
                                <p className="line-clamp-2 text-[11px] text-slate-500 italic" title={item.Especificação}>"{item.Especificação}"</p>
                                <div className="flex flex-wrap gap-1.5">
                                  <span className="inline-flex items-center px-1.5 py-0.5 rounded text-[10px] font-medium bg-slate-100 text-slate-700 border border-slate-200">
                                    Medidas: {features.medida}
                                  </span>
                                </div>
                              </div>
                            ) : (
                              <span className="text-slate-300 italic text-[11px]">Sem especificação</span>
                            )}
                          </td>
                          <td className="px-4 py-4 whitespace-nowrap text-sm text-slate-600">
                            <div className="flex flex-col gap-1 text-[11px]">
                              <span className="font-bold text-slate-700 bg-slate-100 px-2 py-0.5 rounded w-max" title="Categoria Contábil do Produto">
                                {categoria}
                              </span>
                              <span className="flex items-center gap-1 mt-1">Conta: {item['Conta Contábil']}</span>
                            </div>
                          </td>
                          
                          <td className="px-4 py-4 whitespace-nowrap text-center">
                            {duplicateView ? (
                              <div className="flex flex-col items-center">
                                <span className={`text-[11px] font-bold px-2 py-1 rounded-full ${item._isMaster ? 'bg-indigo-600 text-white' : 'bg-indigo-100 text-indigo-800'}`}>
                                  Grupo {item._clusterId}
                                </span>
                                {!item._isMaster && <span className="text-[9px] text-slate-500 mt-1">{item._simScore}% idêntico</span>}
                              </div>
                            ) : (
                              (globalSearch.trim() && item._simScore !== undefined) ? (
                                <div className="flex flex-col items-center gap-1.5">
                                  <span className={`text-[10px] font-bold px-2 py-0.5 rounded ${
                                    item._simScore >= 80 ? 'bg-emerald-100 text-emerald-800 border border-emerald-200' : 
                                    item._simScore >= 40 ? 'bg-amber-100 text-amber-800 border border-amber-200' : 
                                    'bg-rose-100 text-rose-800 border border-rose-200'
                                  }`}>
                                    {item._simScore >= 80 ? 'ALTA' : item._simScore >= 40 ? 'MÉDIA' : 'BAIXA'}
                                  </span>
                                  <div className="w-20 flex items-center gap-1" title={`Match de ${item._simScore}%`}>
                                    <div className="flex-1 h-1.5 bg-slate-200 rounded-full overflow-hidden">
                                      <div 
                                        className={`h-full ${item._simScore >= 80 ? 'bg-emerald-500' : item._simScore >= 40 ? 'bg-amber-400' : 'bg-rose-500'}`} 
                                        style={{ width: `${item._simScore}%` }}
                                      ></div>
                                    </div>
                                    <span className="text-[9px] font-bold text-slate-500 w-5 text-right">{item._simScore}%</span>
                                  </div>
                                </div>
                              ) : <span className="text-slate-300 text-xs">-</span>
                            )}
                          </td>

                          <td className="px-4 py-4 whitespace-nowrap text-center">
                            <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-[11px] font-bold ${
                              item.Status?.toUpperCase() === 'ATIVO' ? 'bg-emerald-100 text-emerald-800' : 
                              item.Status?.toUpperCase() === 'NOVO' ? 'bg-blue-100 text-blue-800' : 'bg-rose-100 text-rose-800'
                            }`}>
                              {item.Status?.toUpperCase()}
                            </span>
                          </td>
                          <td className="px-4 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <div className="flex justify-end gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                              <button onClick={() => toggleStatus(item)} className="p-2 text-emerald-600 hover:bg-emerald-50 rounded-md transition-colors" title="Inverter Status (Ativar/Inativar)">
                                <i className="fas fa-toggle-on"></i>
                              </button>
                              <button onClick={() => openModal(item)} className="p-2 text-blue-600 hover:bg-blue-50 rounded-md transition-colors" title="Editar Detalhes">
                                <i className="fas fa-pen text-sm"></i>
                              </button>
                              <button onClick={() => handleDelete(item.Produto)} className="p-2 text-rose-600 hover:bg-rose-50 rounded-md transition-colors" title="Excluir">
                                <i className="fas fa-trash text-sm"></i>
                              </button>
                            </div>
                          </td>
                        </tr>
                      );
                    }) : (
                      <tr>
                        <td colSpan="7" className="px-6 py-12 text-center text-slate-500">
                          {isAnalyzing ? 'Processando milhões de combinações de strings...' : 'Nenhum produto encontrado com os filtros aplicados.'}
                        </td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>
              
              <div className="bg-slate-50 px-6 py-4 border-t border-slate-200 flex items-center justify-between">
                <span className="text-sm text-slate-600 font-medium">
                  Mostrando <span className="font-bold">{filteredData.length > 0 ? (currentPage - 1) * itemsPerPage + 1 : 0}</span> a <span className="font-bold">{Math.min(currentPage * itemsPerPage, filteredData.length)}</span> de <span className="font-bold">{filteredData.length}</span> resultados
                </span>
                <div className="flex gap-2">
                  <button disabled={currentPage === 1} onClick={() => setCurrentPage(prev => Math.max(prev - 1, 1))} className="w-8 h-8 flex items-center justify-center rounded bg-white border border-slate-300 disabled:opacity-50 text-slate-700 hover:bg-slate-100">
                    <i className="fas fa-chevron-left"></i>
                  </button>
                  <button disabled={currentPage === totalPages || totalPages === 0} onClick={() => setCurrentPage(prev => Math.min(prev + 1, totalPages))} className="w-8 h-8 flex items-center justify-center rounded bg-white border border-slate-300 disabled:opacity-50 text-slate-700 hover:bg-slate-100">
                    <i className="fas fa-chevron-right"></i>
                  </button>
                </div>
              </div>
            </div>
          </main>

          {/* Modal do Formulário */}
          {isModalOpen && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-3xl overflow-hidden flex flex-col max-h-[90vh]">
                <div className="flex justify-between items-center px-6 py-4 border-b border-slate-200 bg-slate-50">
                  <h2 className="text-lg font-bold text-slate-900">
                    {editingItem ? 'Editar Produto' : 'Cadastrar Novo Produto'}
                  </h2>
                  <button onClick={closeModal} className="text-slate-400 hover:text-slate-600 transition-colors">
                    <i className="fas fa-times text-xl"></i>
                  </button>
                </div>
                
                <div className="p-6 overflow-y-auto">
                  <form id="productForm" onSubmit={handleSave} className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div className="space-y-1">
                      <label className="text-sm font-bold text-slate-700">Código do Produto</label>
                      <input required type="text" className="w-full p-2 border border-slate-300 rounded-lg bg-slate-100 focus:ring-2 focus:ring-slate-900 outline-none" 
                        value={formData.Produto} readOnly={!!editingItem} 
                        onChange={e => setFormData({...formData, Produto: e.target.value})} 
                      />
                    </div>
                    
                    <div className="space-y-1">
                      <label className="text-sm font-bold text-slate-700">Status</label>
                      <select className="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-slate-900 bg-white outline-none"
                        value={formData.Status} onChange={e => setFormData({...formData, Status: e.target.value})}
                      >
                        <option value="ATIVO">ATIVO</option>
                        <option value="INATIVO">INATIVO</option>
                      </select>
                    </div>

                    <div className="space-y-1 md:col-span-2">
                      <label className="text-sm font-bold text-slate-700">Descrição Padrão</label>
                      <input required type="text" className="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-slate-900 uppercase outline-none"
                        value={formData.Descrição} onChange={e => setFormData({...formData, Descrição: e.target.value.toUpperCase()})}
                      />
                    </div>

                    <div className="space-y-1 md:col-span-2">
                      <label className="text-sm font-bold text-slate-700 flex justify-between">
                        Especificação Técnica
                        <span className="text-xs font-normal text-slate-500">(Detalhe dimensões, cor, material)</span>
                      </label>
                      <textarea rows="3" className="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-slate-900 outline-none"
                        value={formData.Especificação} onChange={e => setFormData({...formData, Especificação: e.target.value})}
                      ></textarea>
                    </div>

                    <div className="space-y-1">
                      <label className="text-sm font-bold text-slate-700">Tipo de Material</label>
                      <input type="text" className="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-slate-900 uppercase outline-none"
                        value={formData.Tipo} onChange={e => setFormData({...formData, Tipo: e.target.value.toUpperCase()})} placeholder="Ex: MC, SV, AI..."
                      />
                    </div>

                    <div className="space-y-1">
                      <label className="text-sm font-bold text-slate-700">Unidade de Medida</label>
                      <input type="text" className="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-slate-900 uppercase outline-none"
                        value={formData['Unidade Medida']} onChange={e => setFormData({...formData, 'Unidade Medida': e.target.value.toUpperCase()})} placeholder="Ex: UN, KG, PC..."
                      />
                    </div>

                    <div className="space-y-1 md:col-span-2">
                      <label className="text-sm font-bold text-slate-700">Conta Contábil</label>
                      <input type="text" className="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-slate-900 outline-none"
                        value={formData['Conta Contábil']} onChange={e => setFormData({...formData, 'Conta Contábil': e.target.value})}
                      />
                    </div>
                  </form>
                </div>
                
                <div className="px-6 py-4 border-t border-slate-200 bg-slate-50 flex justify-end gap-3">
                  <button type="button" onClick={closeModal} className="px-4 py-2 border border-slate-300 text-slate-700 font-medium rounded-lg hover:bg-slate-100 transition-colors">
                    Cancelar
                  </button>
                  <button type="submit" form="productForm" className="px-4 py-2 bg-slate-900 text-white font-medium rounded-lg hover:bg-slate-800 transition-colors shadow-sm">
                    Salvar Alterações
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function KPICard({ title, value, icon, color }) {
      return (
        <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200 flex items-center gap-4">
          <div className={`w-12 h-12 flex items-center justify-center rounded-xl ${color}`}>
            <i className={`${icon} text-xl`}></i>
          </div>
          <div>
            <p className="text-sm font-semibold text-slate-500">{title}</p>
            <p className="text-2xl font-black text-slate-900 tracking-tight">{value}</p>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
